name: Deploy VPS

on:
  workflow_run:
    workflows: ["Docker Publish"]
    types: [completed]

jobs:
  deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository at published commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE: ghcr.io/${{ github.repository }}:main
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          envs: IMAGE
          script: |
            set -eu
            APP_DIR="/opt/ranking-tenis/be_ranking-tenis"

            if [ ! -d "$APP_DIR/.git" ]; then
              echo "Diretorio $APP_DIR nao contem o repositorio."
              exit 1
            fi

            cd "$APP_DIR"

            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            IMAGE="$IMAGE" docker compose -f docker-compose.vps.yml pull api
            IMAGE="$IMAGE" docker compose -f docker-compose.vps.yml up -d --remove-orphans

            docker image prune -f
